<!DOCTYPE html>
<html>
  <head>
    <title>07 rock paper scissors</title>
    <style>
      body{
        background-color: rgb(40, 40, 40);
        color: white;
        font-family: Arial;
      }
      .title{
        font-weight: bold;
        font-size: 30px;
      }

      .move-piece{
        height: 50px;
        width: 50px;
        background-color: transparent;
        cursor: pointer;
      
      }

      .move-piece2{
         background-color: transparent;
         border-color: white;
         height: 120px;
         width: 120px;
         border-radius: 100px ;
         margin-right: 10px;
         border-width: 3px;

      }

      .move-icon{
         height: 50px;
        width: 50px;

      }

      .result{
        font-size: 26px;
        font-weight: bolder;
      }
    </style>

  </head>
  <body>

    <p class="title">Rock Paper Scissors</p>
   
    <button class="move-piece2" onclick="
     playGame('Rock');

    "><img class="move-piece" src="rock-emoji.png"></button>


    <button class="move-piece2" onclick="
    playGame('Paper');
    
    "><img class="move-piece" src="paper-emoji.png"></button>

    <button class="move-piece2" onclick="
      playGame('Scissors');
    "><img class="move-piece" src="scissors-emoji.png"></button>

    <p class = "js-result result"> </p>
     <p class = "js-moves"></p>
    <p class="js-score"></p>


    <button onclick="
      score.wins = 0;
      score.losses = 0;
      score.ties = 0;

    localStorage.removeItem('score');
    updateScoreElement();
    ">reset score</button>
    <script>

      let score = JSON.parse(localStorage.getItem('score')) ||  {
        wins: 0,
        losses: 0,
        ties: 0,
      };

      updateScoreElement();

      /*
      if (!score){
      wins: 0,
        losses: 0,
        ties: 0,
      }

    }
    */
   

      function playGame(playerMove){
      const computerMove = pickComputerMove();
  
      let result ='';
      if(playerMove === 'Scissors'){
         if (computerMove === 'rock'){
        result = 'you lose';
        }
        else if (computerMove === 'paper'){
          result = 'you win';
        }
        else if(computerMove === 'scissors'){
          result = 'Tie'
        }

      } else if (playerMove === 'Paper') {
         if (computerMove === 'rock'){
        result = 'you win'
        }
        else if (computerMove === 'paper'){
          result = 'Tie';
        }
        else if(computerMove === 'scissors'){
          result = 'you lose'
        }
        
      } else if (playerMove === 'Rock'){
           if (computerMove === 'rock'){
        result = 'Tie';
        }
        else if (computerMove === 'paper'){
          result = 'you lose';
        }
        else if(computerMove === 'scissors'){
          result = 'you win'
        }
      }


     if(result === 'you win'){
      score.wins +=1
     }else if (result === 'you lose'){
      score.losses +=1
     }else if (result === 'Tie'){
      score.ties +=1
     }
     
     localStorage.setItem('score', JSON.stringify(score));

     updateScoreElement();
     
     document.querySelector('.js-result').innerHTML = result;

     document.querySelector('.js-moves').innerHTML = `  You <img src ="${playerMove}-emoji.png" class="move-icon">
      <img src = "${computerMove}-emoji.png" class ="move-icon">computer`
}

function updateScoreElement() {
  document.querySelector('.js-score').
    innerHTML = `Wins: ${score.wins}, Losses: ${score.losses}, Ties: ${score.ties}`;
}

function pickComputerMove() {
  const randomNumber = Math.random();

        let computerMove = '';

        if(randomNumber >=0 && randomNumber < 1 / 3){
        computerMove = 'rock';
        } else if ( randomNumber >= 1 / 3 && randomNumber < 2 / 3 ){
          computerMove = 'paper';
        } else if(randomNumber >= 2 / 3 && randomNumber < 1) {
          computerMove = 'scissors';
        }
        return computerMove;
      }
      
    </script>
  </body>
</html>
