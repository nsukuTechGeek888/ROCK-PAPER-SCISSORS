<!DOCTYPE html>
<html>
  <head>
    <title>07 rock paper scissors</title>
    <style>
      body{
        background-color: rgb(40, 40, 40);
        color: white;
        font-family: Arial;
      }
      .title{
        font-weight: bold;
        font-size: 30px;
      }

      .move-piece{
        height: 50px;
        width: 50px;
        background-color: transparent;
        cursor: pointer;
      
      }

      .move-piece2{
         background-color: transparent;
         border-color: white;
         height: 120px;
         width: 120px;
         border-radius: 100px ;
         margin-right: 10px;
         border-width: 3px;

      }

      .move-icon{
         height: 50px;
        width: 50px;

      }

      .result{
        font-size: 26px;
        font-weight: bolder;
      }
    </style>

  </head>
  <body>

    <p class="title">Rock Paper Scissors</p>
   
    <button class="move-piece2" onclick="
     playGame('Rock');

    "><img class="move-piece" src="rock-emoji.png"></button>


    <button class="move-piece2" onclick="
    playGame('Paper');
    
    "><img class="move-piece" src="paper-emoji.png"></button>

    <button class="move-piece2" onclick="
      playGame('Scissors');
    "><img class="move-piece" src="scissors-emoji.png"></button>

    <p class = "js-result result"> </p>
     <p class = "js-moves"></p>
    <p class="js-score"></p>


    <button onclick="
      score.wins = 0;
      score.losses = 0;
      score.ties = 0;

    localStorage.removeItem('score');
    updateScoreElement();
    ">reset score</button>
    <script src ="main.js">  </script>
  </body>
</html>
